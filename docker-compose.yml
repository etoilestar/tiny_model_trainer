version: "3.9"

services:
  # ──────────────────────────────────────────────
  # Vue 3 前端
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - trainer-net

  # ──────────────────────────────────────────────
  # Flask 后端 API
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/trainer.db
      # Redis 连接配置（在宿主机 .env 文件中填写，或直接修改下方默认值）
      - REDIS_HOST=${REDIS_HOST:-host-gateway}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - UPLOAD_FOLDER=/app/uploads
      - MODEL_FOLDER=/app/models
      - CHECKPOINT_FOLDER=/app/checkpoints
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-models:/app/models
      - backend-checkpoints:/app/checkpoints
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - trainer-net

  # ──────────────────────────────────────────────
  # Celery 训练 Worker
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/trainer.db
      # Redis 连接配置（同上）
      - REDIS_HOST=${REDIS_HOST:-host-gateway}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - UPLOAD_FOLDER=/app/uploads
      - MODEL_FOLDER=/app/models
      - CHECKPOINT_FOLDER=/app/checkpoints
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-models:/app/models
      - backend-checkpoints:/app/checkpoints
    depends_on:
      - backend
    extra_hosts:
      - "host-gateway:host-gateway"
    networks:
      - trainer-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  backend-data:
  backend-uploads:
  backend-models:
  backend-checkpoints:

networks:
  trainer-net:
    driver: bridge
