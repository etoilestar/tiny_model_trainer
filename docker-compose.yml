version: "3.9"

services:
  # ──────────────────────────────────────────────
  # Vue 3 前端
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - trainer-net

  # ──────────────────────────────────────────────
  # Flask 后端 API
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/trainer.db
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_FOLDER=/app/uploads
      - MODEL_FOLDER=/app/models
      - CHECKPOINT_FOLDER=/app/checkpoints
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-models:/app/models
      - backend-checkpoints:/app/checkpoints
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - trainer-net

  # ──────────────────────────────────────────────
  # Celery 训练 Worker
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/trainer.db
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_FOLDER=/app/uploads
      - MODEL_FOLDER=/app/models
      - CHECKPOINT_FOLDER=/app/checkpoints
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-models:/app/models
      - backend-checkpoints:/app/checkpoints
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - trainer-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────
  # Redis 消息队列
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trainer-net

volumes:
  backend-data:
  backend-uploads:
  backend-models:
  backend-checkpoints:

networks:
  trainer-net:
    driver: bridge
