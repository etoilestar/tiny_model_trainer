version: "3.9"

services:
  # ──────────────────────────────────────────────
  # Vue 3 前端
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - trainer-net

  # ──────────────────────────────────────────────
  # Flask 后端 API
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/${PLATFORM:-amd64}
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/trainer.db
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      - UPLOAD_FOLDER=/app/uploads
      - MODEL_FOLDER=/app/models
      - CHECKPOINT_FOLDER=/app/checkpoints
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-models:/app/models
      - backend-checkpoints:/app/checkpoints
    networks:
      - trainer-net

  # ──────────────────────────────────────────────
  # Celery 训练 Worker
  # ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    platform: linux/${PLATFORM:-amd64}
    command: celery -A celery_worker.celery worker --loglevel=info --concurrency=2
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/trainer.db
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      - UPLOAD_FOLDER=/app/uploads
      - MODEL_FOLDER=/app/models
      - CHECKPOINT_FOLDER=/app/checkpoints
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
      - backend-models:/app/models
      - backend-checkpoints:/app/checkpoints
    depends_on:
      backend:
        condition: service_started
    networks:
      - trainer-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────
  # Redis 消息队列（使用本机已有的 Redis，无需容器）
  # 请在 .env 文件中配置 REDIS_URL
  # ──────────────────────────────────────────────

volumes:
  backend-data:
  backend-uploads:
  backend-models:
  backend-checkpoints:

networks:
  trainer-net:
    driver: bridge
